<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Netlify Form Detection Helper</title>
</head>
<body>

  <h2>Netlify Form Detection Helper</h2>

  <!-- 
    This page exists ONLY so Netlify can detect the form.
    The action sends the form to a real thank-you page.
  -->

  <form 
    name="contact"
    method="POST"
    action="/thank-you.html"
    data-netlify="true"
    netlify-honeypot="bot-field"
  >

    <!-- Required hidden input -->
    <input type="hidden" name="form-name" value="contact" />

    <!-- Honeypot spam protection -->
    <p style="display:none;">
      <label>Don’t fill this out:
        <input name="bot-field" />
      </label>
    </p>

    <p>
      <label>Name:
        <input type="text" name="name" />
      </label>
    </p>

    <p>
      <label>Email:
        <input type="email" name="email" />
      </label>
    </p>

    <p>
      <label>Message:
        <textarea name="message"></textarea>
      </label>
    </p>

    <p>
      <button type="submit">Dummy Submit</button>
    </p>

  </form>

  <p>Do not delete while debugging Netlify form detection.</p>

</body>
</html>
