<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact — OrcaRobotics</title>
  <style>
    :root{--bg:#071428;--panel:rgba(11,35,52,0.88);--accent:#0b74ff;--muted:#9fb1c4}
    body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#071428 0%, #042336 100%);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px}
    .card{width:100%;max-width:820px;background:var(--panel);padding:28px;border-radius:12px;box-shadow:0 10px 30px rgba(2,8,23,0.5)}
    h1{margin:0 0 12px 0;font-size:28px}
    p.lead{color:var(--muted);margin:0 0 20px 0}
    label{display:block;margin-top:12px;font-size:13px;color:var(--muted)}
    input[type="text"],input[type="email"],textarea{
      width:100%;box-sizing:border-box;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);color:#fff;margin-top:6px;font-size:15px
    }
    textarea{min-height:140px;resize:vertical}
    .actions{margin-top:18px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    button{background:var(--accent);color:#fff;border:0;padding:12px 18px;border-radius:10px;cursor:pointer;font-weight:600}
    .small{font-size:13px;color:var(--muted)}
    a.navlink{color:#cfe8ff;text-decoration:underline}
    @media (max-width:640px){.card{padding:18px}}
  </style>
</head>
<body>
  <div class="card" role="main">
    <h1>Contact OrcaRobotics</h1>
    <p class="lead">Interested in joining, mentoring, or sponsoring? Send us a message — we’ll reply as soon as we can.</p>

    <!-- Netlify Form: keep name="contact" and data-netlify attributes exactly as shown -->
    <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/thank-you.html">
      <!-- Hidden input so Netlify knows the form name during deploy -->
      <input type="hidden" name="form-name" value="contact" />
      <!-- Honeypot spam trap (bots fill, humans do not) -->
      <p style="display:none">
        <label>Don’t fill this out: <input name="bot-field" /></label>
      </p>

      <label for="name">Name</label>
      <input id="name" name="name" type="text" placeholder="Your name" required />

      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="you@example.com" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="How can we help?" required></textarea>

      <div class="actions">
        <button type="submit">Send Message</button>
        <div class="small">Or email us directly at <a class="navlink" href="mailto:OrcaRoboticsUSA@gmail.com">OrcaRoboticsUSA@gmail.com</a></div>
      </div>
    </form>

  </div>
</body>
</html>
